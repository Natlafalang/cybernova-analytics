{% extends "admin/base.html" %}
{% block title %}Change Password - CyberNova{% endblock %}

{% block admin_content %}
<h1 class="admin-page-title">Change My Password</h1>

{% if msg %}
<div class="alert alert-{{ msg[0] }}" style="max-width: 500px;">{{ msg[1] }}</div>
{% endif %}

<div style="background: #112840; border: 1px solid #1e3a5f; border-radius: 10px; padding: 25px; max-width: 500px;">
    <p style="color: #a8b2d8; margin-bottom: 20px; font-size: 0.9rem;">
        Logged in as: <strong style="color: #00d4ff;">{{ session.admin_username }}</strong>
    </p>

    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label style="display:block; color:#ccd6f6; font-size:0.88rem; font-weight:600; margin-bottom:5px;">Current Password</label>
            <input type="password" name="current_password" required
                style="width:100%; padding:9px 12px; background:#0a1628; border:1.5px solid #1e3a5f; border-radius:6px; color:#ccd6f6; font-size:0.9rem; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; color:#ccd6f6; font-size:0.88rem; font-weight:600; margin-bottom:5px;">New Password</label>
            <input type="password" name="new_password" required
                style="width:100%; padding:9px 12px; background:#0a1628; border:1.5px solid #1e3a5f; border-radius:6px; color:#ccd6f6; font-size:0.9rem; box-sizing:border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; color:#ccd6f6; font-size:0.88rem; font-weight:600; margin-bottom:5px;">Confirm New Password</label>
            <input type="password" name="confirm_password" required
                style="width:100%; padding:9px 12px; background:#0a1628; border:1.5px solid #1e3a5f; border-radius:6px; color:#ccd6f6; font-size:0.9rem; box-sizing:border-box;">
        </div>

        <button type="submit" class="btn btn-primary">Update Password</button>
    </form>
</div>
{% endblock %}
