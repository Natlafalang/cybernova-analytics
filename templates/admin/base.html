<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Admin — CyberNova{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<nav>
  <a class="nav-brand" href="{{ url_for('index') }}">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M14 2L4 7v8c0 5.5 4.3 10.7 10 12 5.7-1.3 10-6.5 10-12V7L14 2z" fill="#00d4ff" opacity=".9"/></svg>
    Cyber<span>Nova</span> <span style="font-size:.75rem;background:rgba(0,212,255,.2);color:var(--accent);padding:.15rem .5rem;border-radius:3px;margin-left:.5rem">ADMIN</span>
  </a>
  <div class="nav-links">
    <span style="color:#a8b2d8;font-size:.88rem">{{ session.admin_username }}</span>
    <a href="{{ url_for('index') }}" style="color:#a8b2d8;font-size:.88rem">View Site</a>
    <a href="{{ url_for('admin_logout') }}" style="color:#ff6b6b;font-size:.88rem">Logout</a>
  </div>
</nav>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-title">Navigation</div>
    <a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if request.endpoint=='admin_dashboard' }}">Dashboard</a>
    <a href="{{ url_for('admin_requests') }}" class="{{ 'active' if request.endpoint=='admin_requests' }}">Security Requests</a>
    <a href="{{ url_for('admin_breach') }}" class="{{ 'active' if request.endpoint=='admin_breach' }}">Breach Report</a>
    <a href="{{ url_for('admin_analytics') }}" class="{{ 'active' if request.endpoint=='admin_analytics' }}">Analytics</a>
    <a href="{{ url_for('admin_content') }}" class="{{ 'active' if request.endpoint=='admin_content' }}">Content Manager</a>
    <a href="{{ url_for('admin_ai_report') }}" class="{{ 'active' if request.endpoint=='admin_ai_report' }}">AI Report Generator</a>
  </aside>
  <main class="admin-main">
    {% block admin_content %}{% endblock %}
  </main>
</div>
</body>
</html>
