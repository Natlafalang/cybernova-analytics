<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CyberNova Analytics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: #0a1628;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            background: #112840;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
        }

        .login-box h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .login-box p {
            color: #a8b2d8;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .login-box label {
            display: block;
            color: #ccd6f6;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .login-box input {
            width: 100%;
            padding: 10px 12px;
            background: #0a1628;
            border: 1.5px solid #1e3a5f;
            border-radius: 6px;
            color: #ccd6f6;
            font-size: 0.95rem;
            margin-bottom: 18px;
            box-sizing: border-box;
        }

        .login-box input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .login-box button {
            width: 100%;
            padding: 11px;
            background: #00d4ff;
            color: #0a1628;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
        }

        .login-box button:hover {
            background: #00b8db;
        }

        .error-msg {
            background: #3a1a1a;
            color: #f08080;
            border: 1px solid #6b2a2a;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.88rem;
            margin-bottom: 18px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-area span {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .logo-area span b {
            color: #00d4ff;
        }

        .back-link {
            text-align: center;
            margin-top: 18px;
        }

        .back-link a {
            color: #a8b2d8;
            font-size: 0.83rem;
            text-decoration: none;
        }

        .back-link a:hover {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-area">
            <span>Cyber<b>Nova</b></span>
        </div>
        <h2>Staff Login</h2>
        <p>Authorised personnel only</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Sign In</button>
        </form>

        <div class="back-link">
            <a href="/">Back to website</a>
        </div>
    </div>
</body>
</html>
