<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CyberNova Analytics{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav>
  <a class="nav-brand" href="{{ url_for('index') }}">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M14 2L4 7v8c0 5.5 4.3 10.7 10 12 5.7-1.3 10-6.5 10-12V7L14 2z" fill="#00d4ff" opacity=".9"/><path d="M14 2L4 7v8c0 5.5 4.3 10.7 10 12" fill="none" stroke="#fff" stroke-width="1.5"/></svg>
    Cyber<span>Nova</span>
  </a>
  <div class="nav-links">
    <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint=='index' }}">Home</a>
    <a href="{{ url_for('blog') }}" class="{{ 'active' if request.endpoint in ['blog','blog_post'] }}">Blog</a>
    <a href="{{ url_for('testimonials_page') }}" class="{{ 'active' if request.endpoint=='testimonials_page' }}">Testimonials</a>
    <a href="{{ url_for('gallery') }}" class="{{ 'active' if request.endpoint=='gallery' }}">Gallery</a>
    <a href="{{ url_for('chat') }}" class="{{ 'active' if request.endpoint=='chat' }}">AI Assistant</a>
    <a href="{{ url_for('contact') }}" class="btn-nav">Contact Security Team</a>
    <a href="{{ url_for('admin_login') }}" style="color:#a8b2d8;font-size:.82rem;border:1px solid #a8b2d8;padding:.3rem .85rem;border-radius:4px;margin-left:.25rem">Staff Login</a>
  </div>
</nav>
{% block content %}{% endblock %}
<footer>
  <div class="footer-brand">Cyber<span>Nova</span> Analytics Ltd</div>
  <p>AI-Driven Cybersecurity for Southern Africa &mdash; Gaborone, Botswana</p>
  <p style="margin-top:.5rem">&copy; 2026 CyberNova Analytics. All rights reserved.</p>
</footer>
</body>
</html>
